substitutions:
  _IMAGE: 'gcr.io/autoremind-480200/gradesync-job:latest'
  _REGION: 'us-central1'
  _JOB_NAME: 'gradesync-daily-job'
  _SA: 'gradesync@autoremind-480200.iam.gserviceaccount.com'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_IMAGE', '-f', 'Dockerfile.gradesync', '.']
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE']
    id: 'push'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    args:
      - gcloud
      - run
      - jobs
      - deploy
      - $_JOB_NAME
      - --image=$_IMAGE
      - --region=$_REGION
      - --task-timeout=30m
      - --max-retries=1
      - --service-account=$_SA
      - --set-secrets=GRADESCOPE_EMAIL=GRADESCOPE_EMAIL:latest,GRADESCOPE_PASSWORD=GRADESCOPE_PASSWORD:latest
      - --project=$PROJECT_ID
      - --quiet

images:
  - '$_IMAGE'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
