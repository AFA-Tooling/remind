<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoRemind – Login</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* Page specific adjustments */
    .login-container {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      padding: 48px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      text-align: center;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body>
  <!-- Decorative Background -->
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav__container">
      <a class="brand" href="./index.html">
        <img src="logo.png" alt="AutoRemind Logo">
        AutoRemind
      </a>
      <div class="nav__links">
        <a href="./about.html">About</a>
        <a href="mailto:autoremind@berkeley.edu" class="btn btn--primary">Contact Us</a>
      </div>
    </div>
  </nav>

  <!-- Login Main -->
  <main class="container login-container">
    <div class="login-card">
      <h1 style="font-size: 2rem; margin-bottom: 24px;">Welcome Back</h1>
      <p style="color: var(--color-text-muted); margin-bottom: 32px;">
        Sign in to manage your notifications and stay on top of your coursework.
      </p>

      <button class="btn btn--primary btn--login" style="width: 100%; padding: 16px; font-size: 1.1rem;">
        Sign In with Google
      </button>

      <p style="margin-top: 24px; font-size: 0.9rem; color: #999;">
        Powered by Supabase Auth
      </p>
    </div>
  </main>

  <footer class="site-footer container">
    <p>© 2025 AutoRemind. All rights reserved.</p>
  </footer>

  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Load credentials -->
  <script>
    (async function () {
      await new Promise(resolve => setTimeout(resolve, 50));
      if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
        console.log('✅ Using server-injected credentials');
        loadAuth();
        return;
      }
      try {
        const response = await fetch('/api/config');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const config = await response.json();
        window.SUPABASE_URL = config.SUPABASE_URL;
        window.SUPABASE_ANON_KEY = config.SUPABASE_ANON_KEY;
        loadAuth();
      } catch (error) {
        console.error('❌ Error loading credentials:', error);
        loadAuth(); // Try anyway
      }

      function loadAuth() {
        const script = document.createElement('script');
        script.src = './auth.js';
        script.defer = true;
        document.head.appendChild(script);
      }
    })();
  </script>

  <script>
    // Wait for auth to be available
    function waitForAuth(callback, maxAttempts = 10) {
      let attempts = 0;
      const checkAuth = () => {
        attempts++;
        const authInstance = window.auth || (typeof auth !== 'undefined' ? auth : null);
        if (authInstance && authInstance.supabase) {
          callback(authInstance);
        } else if (attempts < maxAttempts) {
          setTimeout(checkAuth, 200);
        } else {
          callback(null);
        }
      };
      checkAuth();
    }

    document.addEventListener('DOMContentLoaded', () => {
      waitForAuth((auth) => {
        if (auth) {
          auth.onAuthStateChange((user, session, loading) => {
            if (!loading && user) {
              window.location.href = './index.html';
            }
          });
        }

        const loginButton = document.querySelector('.btn--login');
        if (loginButton) {
          loginButton.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = './auth.html';
          });
        }
      });
    });
  </script>
</body>

</html>
