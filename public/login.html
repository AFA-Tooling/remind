<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoRemind – Login</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* Page specific adjustments */
    .login-container {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      padding: 48px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      text-align: center;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .error-message {
      background: #fef2f2;
      color: #d32f2f;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      border: 1px solid #fecaca;
      display: none;
    }
  </style>
</head>

<body>
  <!-- Decorative Background -->
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav__container">
      <a class="brand" href="./index.html">
        <img src="logo.png" alt="AutoRemind Logo">
        AutoRemind
      </a>
      <div class="nav__links">
        <a href="./about.html">About</a>
        <a href="https://github.com/AFA-Tooling/remind" target="_blank" class="nav__link"
          style="display: inline-flex; align-items: center;">
          GitHub
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px; opacity: 0.7;">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
        <a href="./login.html" class="btn btn--outline">Log In</a>
      </div>
    </div>
  </nav>

  <!-- Login Main -->
  <main class="container login-container">
    <div class="login-card">
      <h1 style="font-size: 2rem; margin-bottom: 24px;">Welcome Back</h1>
      <p style="color: var(--color-text-muted); margin-bottom: 32px;">
        Sign in to manage your notifications and stay on top of your coursework.
      </p>

      <div id="error-message" class="error-message"></div>

      <button id="google-signin-btn" class="btn btn--google btn--login"
        style="width: 100%; padding: 12px; font-size: 1rem;">
        <svg viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
          <path fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
          <path fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
        Sign in with Google
      </button>
    </div>
  </main>

  <footer class="site-footer container">
    <p>
      <span style="font-weight: 600;">Part of the <a href="https://github.com/AFA-Tooling/" target="_blank">AFA-Tooling
          ecosystem</a>.</span><br>
      © 2026 AutoRemind. Developed at UC Berkeley. <br>
      <a href="https://github.com/AFA-Tooling/remind" target="_blank" style="font-size: 0.9em; opacity: 0.8;">View
        Source</a>
    </p>
  </footer>

  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Load credentials -->
  <script>
    (async function () {
      await new Promise(resolve => setTimeout(resolve, 50));
      if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
        console.log('✅ Using server-injected credentials');
        loadAuth();
        return;
      }
      try {
        const response = await fetch('/api/config');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const config = await response.json();
        window.SUPABASE_URL = config.SUPABASE_URL;
        window.SUPABASE_ANON_KEY = config.SUPABASE_ANON_KEY;
        loadAuth();
      } catch (error) {
        console.error('❌ Error loading credentials:', error);
        loadAuth(); // Try anyway
      }

      function loadAuth() {
        const script = document.createElement('script');
        script.src = './auth.js';
        script.defer = true;
        document.head.appendChild(script);
      }
    })();
  </script>

  <script>
    // Wait for auth to be available
    function waitForAuth(callback, maxAttempts = 10) {
      let attempts = 0;
      const checkAuth = () => {
        attempts++;
        const authInstance = window.auth || (typeof auth !== 'undefined' ? auth : null);
        if (authInstance && authInstance.supabase) {
          callback(authInstance);
        } else if (attempts < maxAttempts) {
          setTimeout(checkAuth, 200);
        } else {
          callback(null);
        }
      };
      checkAuth();
    }

    document.addEventListener('DOMContentLoaded', () => {
      waitForAuth((auth) => {
        if (auth) {
          // If already logged in, redirect to index
          auth.onAuthStateChange((user, session, loading) => {
            if (!loading && user) {
              window.location.href = './index.html';
            }
          });

          // Handle Google Sign In
          const loginBtn = document.getElementById('google-signin-btn');
          const errorEl = document.getElementById('error-message');

          if (loginBtn) {
            loginBtn.addEventListener('click', async (e) => {
              e.preventDefault();
              errorEl.style.display = 'none';
              loginBtn.disabled = true;
              loginBtn.innerHTML = 'Sign in with Google...'; // Simple loading state

              try {
                const { error } = await auth.signInWithGoogle();
                if (error) {
                  throw error;
                }
                // Redirect handling is done by Supabase/OAuth flow
              } catch (err) {
                console.error(err);
                errorEl.textContent = err.message || 'Failed to sign in';
                errorEl.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = `
                    <svg viewBox="0 0 48 48" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px;">
                      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                      <path fill="none" d="M0 0h48v48H0z" />
                    </svg>
                    Sign in with Google
                  `;
              }
            });
          }
        }
      });
    });
  </script>
</body>

</html>
