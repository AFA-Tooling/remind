<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoRemind – Login</title>

  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Load credentials -->
  <script>
    (async function () {
      await new Promise(resolve => setTimeout(resolve, 50));
      if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
        console.log('✅ Using server-injected credentials');
        const script = document.createElement('script');
        script.src = './auth.js';
        script.defer = true;
        document.head.appendChild(script);
        return;
      }
      try {
        const response = await fetch('/api/config');
        if (!response.ok) throw new Error('Failed to fetch config');
        const config = await response.json();
        window.SUPABASE_URL = config.SUPABASE_URL;
        window.SUPABASE_ANON_KEY = config.SUPABASE_ANON_KEY;
        const script = document.createElement('script');
        script.src = './auth.js';
        script.defer = true;
        document.head.appendChild(script);
      } catch (error) {
        console.error(error);
        const script = document.createElement('script');
        script.src = './auth.js';
        script.defer = true;
        document.head.appendChild(script);
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css">
  <style>
    /* Login specific overrides */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-top: -10vh;
      /* Adjust for visual balance */
    }

    .btn--login {
      background: var(--olive);
      color: #fff;
      padding: 14px 32px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s;
    }

    .btn--login:hover {
      background: var(--olive-dark);
    }

    .error-message {
      color: #d32f2f;
      background: #fef2f2;
      padding: 10px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav__container">
      <a class="brand" href="./index.html">
        <img src="logo.png" alt="AutoRemind Logo">
        AutoRemind
      </a>
      <div class="nav__content">
        <div class="nav__links">
          <a href="./about.html" class="nav__link">About Us</a>
          <a href="mailto:autoremind@berkeley.edu" class="btn btn--primary" style="text-decoration:none;">Contact Us</a>
        </div>
        <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Login Hero -->
  <section class="hero">
    <h1>Welcome!</h1>
    <p style="margin-bottom: 32px; color: var(--muted);">Sign in to manage your notifications.</p>

    <button id="google-signin-btn" class="btn--login">
      <!-- Simple Google Icon -->
      <svg viewBox="0 0 48 48" width="24" height="24">
        <path fill="white"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
        <path fill="white"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
        <path fill="white"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
        <path fill="white"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
        <path fill="none" d="M0 0h48v48H0z" />
      </svg>
      Sign In with Google
    </button>
    <div id="error-message" class="error-message"></div>
  </section>

  <div class="arc-bg"></div>
  <footer class="site-footer container">
    <small>© 2026 AutoRemind. All rights reserved.</small>
  </footer>

  <script>
    document.getElementById('nav-toggle').addEventListener('click', () => {
      document.querySelector('.nav').classList.toggle('nav--open');
    });

    // Wait for auth
    function waitForAuth(callback) {
      let attempts = 0;
      const check = () => {
        if (window.auth && window.auth.supabase) callback(window.auth);
        else if (attempts++ < 20) setTimeout(check, 100);
      };
      check();
    }

    waitForAuth((auth) => {
      // Redirect if already logged in
      auth.onAuthStateChange((user, session, loading) => {
        if (!loading && user) window.location.href = './index.html';
      });

      const btn = document.getElementById('google-signin-btn');
      const err = document.getElementById('error-message');

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.style.opacity = '0.7';
        btn.innerHTML = 'Signing in...';
        try {
          const { error } = await auth.signInWithGoogle();
          if (error) throw error;
        } catch (e) {
          console.error(e);
          err.textContent = e.message;
          err.style.display = 'block';
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.innerHTML = 'Sign In with Google';
        }
      });
    });
  </script>
</body>

</html>
